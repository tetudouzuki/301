<div class="register-container">
  <h2>アカウント登録</h2>
  <form action="register.php" method="POST">
    <!-- 名前入力 -->
    <label for="reg-name">お名前</label>
    <input type="text" id="reg-name" name="name" required placeholder="例: 山田太郎">

    <!-- メールアドレス入力 -->
    <label for="reg-email">メールアドレス</label>
    <input type="email" id="reg-email" name="email" required placeholder="例: test@example.com">

    <!-- パスワード入力 -->
    <label for="reg-password">パスワード</label>
    <input type="password" id="reg-password" name="password" required placeholder="8文字以上">

    <!-- パスワード確認用入力 -->
    <label for="reg-password-confirm">パスワード（確認）</label>
    <input type="password" id="reg-password-confirm" name="password_confirm" required placeholder="もう一度入力">

    <!-- 登録ボタン -->
    <button type="submit">登録する</button>
  </form>
  <p>すでにアカウントをお持ちの方は<a href="login.html">ログイン</a>へ</p>
</div>
