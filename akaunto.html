<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アカウント登録</title>
<style>
  body {
    font-family: sans-serif;
    display: flex;
    justify-content: center;
    background-color: #f4f4f4;
  }
  .register-form {
    background-color: #fff;
    padding: 20px;
    margin-top: 50px;
    border-radius: 8px;
    width: 300px;
  }
  .form-group {
    margin-bottom: 15px;
  }
  label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
  }
  input {
    width: 100%;
    padding: 10px;
    box-sizing: border-box;
    border: 1px solid #ccc;
    border-radius: 4px;
  }
  button {
    width: 100%;
    padding: 10px;
    background-color: #007bff;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
  }
  button:hover {
    background-color: #0056b3;
  }
</style>
</head>
<body>

<div class="register-form">
  <h2>新規登録</h2>
  <form action="submit.php" method="POST">
    
    <div class="form-group">
      <label for="name">お名前</label>
      <input type="text" id="name" name="name" required placeholder="例：山田 太郎">
    </div>

    <div class="form-group">
      <label for="email">メールアドレス</label>
      <input type="email" id="email" name="email" required placeholder="例：info@example.com">
    </div>

    <div class="form-group">
      <label for="password">パスワード</label>
      <input type="password" id="password" name="password" required minlength="8" placeholder="8文字以上">
    </div>

    <button type="submit">登録する</button>

  </form>
</div>

</body>
</html>
